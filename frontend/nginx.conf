# ============================================================
# Nginx 配置文件（前端容器的Web服务器 + 反向代理）
# 位置：/etc/nginx/conf.d/default.conf
# ============================================================

server {
    listen 80;                              # Nginx 监听80端口
    server_name localhost;                  # 服务器名称

    root /usr/share/nginx/html;             # 静态文件根目录（Vue打包后的dist内容）
    index index.html;                       # 默认首页文件

    # ============ 前端路由处理 ============
    location / {
        # try_files：依次尝试匹配文件
        # $uri        → 先找对应的文件（如 /css/style.css）
        # $uri/       → 再找对应的目录
        # /index.html → 都找不到就返回 index.html
        # 这一步是Vue History模式路由的关键：刷新页面时不会404
        try_files $uri $uri/ /index.html;
    }

    # ============ API反向代理 ============
    location /api/ {
        # 将以 /api/ 开头的请求转发给后端Spring Boot
        # backend 是docker-compose中定义的服务名（容器名）
        # 容器间通过 hotel-network 桥接网络通信
        proxy_pass http://backend:8080/api/;

        # 传递客户端真实信息给后端
        proxy_set_header Host $host;                    # 原始请求的主机名
        proxy_set_header X-Real-IP $remote_addr;        # 客户端真实IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # 代理链IP
        proxy_set_header X-Forwarded-Proto $scheme;     # 原始请求协议（http/https）
    }

    # ============ Gzip压缩 ============
    gzip on;                                # 开启gzip压缩，减小传输体积
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;                   # 小于1KB的文件不压缩（压缩反而更慢）
}
