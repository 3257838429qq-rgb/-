# ============================================================
# Docker Compose 编排文件
# 一键启动 MySQL + Spring Boot后端 + Vue前端 三个服务
# 使用方式：docker compose up -d
# ============================================================

services:

  # ==================== MySQL 数据库服务 ====================
  mysql:
    image: mysql:8.0                         # 使用 MySQL 8.0 官方镜像
    container_name: hotel-mysql              # 容器名称，也是容器间通信的主机名
    restart: unless-stopped                  # 容器异常退出时自动重启
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}   # root密码，从.env文件读取
      MYSQL_DATABASE: ${MYSQL_DATABASE}             # 启动时自动创建的数据库名
      TZ: Asia/Shanghai                      # 时区设为东八区
    ports:
      - "${MYSQL_PORT:-3306}:3306"           # 端口映射：宿主机:容器
                                              # ${MYSQL_PORT:-3306} 表示优先读取.env，
                                              # 如果没定义则默认3306
    volumes:
      - mysql-data:/var/lib/mysql            # 数据卷：持久化数据库文件
                                              # 容器删除后数据不丢失
      - ./database/sql:/docker-entrypoint-initdb.d
                                              # 挂载SQL脚本目录，MySQL首次启动时
                                              # 会自动执行里面的 .sql 文件建表
    healthcheck:                             # 健康检查：确保MySQL真正就绪
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s                          # 每10秒检查一次
      timeout: 5s                            # 单次检查超时时间
      retries: 10                            # 连续失败10次才判定为不健康
    networks:
      - hotel-network                        # 加入自定义网络

  # ==================== Spring Boot 后端服务 ====================
  backend:
    build:                                   # 从 Dockerfile 构建镜像
      context: ./backend                     # Dockerfile所在目录
      dockerfile: Dockerfile
    container_name: hotel-backend
    restart: unless-stopped
    depends_on:                              # 依赖关系：等MySQL健康检查通过后才启动
      mysql:
        condition: service_healthy           # 必须是service_healthy，不是单纯的started
    environment:                             # 环境变量会覆盖 application.yml 中的配置
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf-8&characterSetResults=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
                                              # ↑ 注意数据库主机名是 mysql（容器名），不是localhost
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
                                              # 激活的Spring配置环境，默认prod
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}  # DeepSeek AI API密钥
    ports:
      - "${BACKEND_PORT:-8080}:8080"         # 后端端口映射
    networks:
      - hotel-network

  # ==================== Vue前端 + Nginx 服务 ====================
  frontend:
    build:                                   # 多阶段构建（详见 frontend/Dockerfile）
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hotel-frontend
    restart: unless-stopped
    depends_on:
      - backend                              # 等后端启动后再启动
    ports:
      - "${FRONTEND_PORT:-80}:80"            # 前端端口映射，默认80
    networks:
      - hotel-network

# ==================== 数据卷 ====================
volumes:
  mysql-data:                                # 命名卷，Docker自动管理存储位置
                                              # 数据在宿主机上，即使容器被删除也能保留

# ==================== 自定义网络 ====================
networks:
  hotel-network:                             # 桥接网络（bridge）
    driver: bridge                           # 同一网络内的容器可以通过容器名互相通信
                                              # 比如后端用 mysql:3306 就能连数据库
